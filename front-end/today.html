<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" type="text/css" href="style.css" />
        <link rel="stylesheet" type="text/css" href="today-style.css" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0"
        />
        <title>Сегодня - Todoist</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="https://images-eds-ssl.xboxlive.com/image?url=4rt9.lXDC4H_93laV1_eHM0OYfiFeMI2p9MWie0CvL99U4GA1gf6_kayTt_kBblFwHwo8BW8JXlqfnYxKPmmBUwv1PH4pdQ7t_SNzEV_.2J3d4JjdkXiNaa0xNklzx5ANhOfXiCoWf71sEOCPn.WJrLE9Qydp5V9jK3_rKBgsq0-&format=source"
        />
    </head>
    <body>
        <nav>
            <div id="user-icon-container">
                <button id="user">
                    <img
                        src="https://preview.redd.it/can-yall-give-me-your-best-tomie-pfp-v0-ar1glvm2u0bb1.jpg?width=1913&format=pjpg&auto=webp&s=6eeda720cf87efd74a07c9911fdb18d6881fa724"
                        alt="profile picture"
                    />
                    <span id="username">Евлампий</span>
                    <span class="material-symbols-outlined">
                        stat_minus_1
                    </span>
                </button>

                <button>
                    <span class="material-symbols-outlined" id="open-close">
                        right_panel_close
                    </span>
                </button>
            </div>

            <button id="add-task">
                <span class="material-symbols-outlined"> add_circle </span>
                <span>Добавить задачу</span>
            </button>

            <div id="pages-nav" tabindex="1">
                <div class="section" id="inbox">
                    <a href="inbox.html">
                        <span class="material-symbols-outlined"> inbox </span>
                        <span>Входящие</span>
                    </a>
                    <div class="num-container">
                        <span id="icoming-task-number"> 8 </span>
                    </div>
                </div>

                <div class="section" id="today">
                    <a href="today.html">
                        <span class="material-symbols-outlined"> today </span>
                        <span>Сегодня</span>
                    </a>
                    <div class="num-container">
                        <span id="today-task-number"> 16 </span>
                    </div>
                </div>

                <div class="section" id="calendar">
                    <a href="calendar.html">
                        <span class="material-symbols-outlined">
                            calendar_month
                        </span>
                        <span>Предстоящие</span>
                    </a>
                </div>
            </div>
        </nav>

        <span>ICONA</span>
    </body>
</html>
